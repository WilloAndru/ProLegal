<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProLegal Solution</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="icon" href="../images/justicia.png" type="image/x-icon">
    <script>
        function validateForm() {
            var password = document.getElementById("password").value;
            var confirmPassword = document.getElementById("confirm_password").value;

            if (password !== confirmPassword) {
                alert("Las contraseñas no coinciden. Por favor, inténtelo de nuevo.");
                return false;
            }
            return true;
        }
    </script>
</head>

<body>

    <header class='header'>
        <a title="Home" href="../index.html">
            <img class="icon" src="../images/casa.png">
        </a>
        <a title="Perfil" href="login.php">
            <img class="icon" src="../images/perfil.png">
        </a>
        <a title="Solicitud" href="login.php">
            <img class="icon" src="../images/mensaje.png">
        </a>
    </header>

    <div class="login body">
        <form action="../php/crearUsuario.php" method="POST" onsubmit="return validateForm();">
            <div>
                <img class="icon" src="../images/mensaje.png">
                <h4>Registro</h4>
            </div>
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" required>
            <label for="identificaion">Identificación</label>
            <input type="text" id="identificaion" name="identificaion" required>
            <label for="date">Fecha de nacimiento</label>
            <input type="date" id="date" name="date" required>
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" name="telefono" required>
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required>
            <label for="confirm_password">Confirmar contraseña</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
            <button class="stylesDiv" type="submit">Registrar</button>
        </form>
        <div class="div2">
            <h5>¿Ya tienes una cuenta?</h5>
            <a href="login.php"><button class="stylesDiv">Inicia sesión aquí</button></a>
        </div>
    </div>

</body>

</html>
